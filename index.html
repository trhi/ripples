<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ripples - ecologies</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app">
    <header class="app-header">
        <h1>RIPPLES</h1>
        <div class="scenario-select">
            <label for="scenario">Scenario</label>
            <select id="scenario"></select>
        </div>
    </header>

    <section class="latent-panel top-latent-panel">
        <h2>Latent Library</h2>
        <div id="latentActions"></div>
        <section class="lock-control">
            <button id="lockBtn" disabled>do</button>
        </section>
    </section>

    <main class="app-main">
        <section class="grid-section">
            <div id="grid" class="grid"></div>
        </section>

        <aside class="sidebar">
            <section class="entity-pool">
                <h2>Entities</h2>
                <ul id="entityList"></ul>
                <button id="addEntityBtn" class="add-entity">Add Entity</button>
            </section>
            <!-- vector controls removed in favor of latent text buttons -->

            <section class="audit-log">
                <h2>Audit Log</h2>
                <ul id="auditLog"></ul>
            </section>
        </aside>

        <section class="worldtext-view">
            <h2>Worldtext</h2>
            <div id="worldtext" class="worldtext"></div>
        </section>
    </main>

    <section class="autoplay-control">
        <button id="autoplayBtn">Autoplay: Off (Space)</button>
        <span id="countdown"></span>
    </section>

    <footer class="app-footer">
        <small>&copy; 2025-2026 RIPPLES Project</small>
    </footer>
</div>

<script src="app.js"></script>
</body>
</html>
